<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stoxtrac | AI Stock Analysis</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: white; text-align: center; padding: 40px 20px; }
        .container { max-width: 600px; margin: auto; background: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        .setup-box { background: #334155; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.9em; }
        input { padding: 12px; width: calc(100% - 24px); border-radius: 6px; border: 1px solid #475569; background: #0f172a; color: white; margin-bottom: 15px; }
        button { padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1em; width: 100%; transition: 0.2s; }
        button:hover { background: #7dd3fc; }
        #results { margin-top: 25px; text-align: left; line-height: 1.6; background: #0f172a; padding: 20px; border-radius: 8px; display: none; white-space: pre-wrap; }
        .loader { display: none; margin-top: 20px; color: #38bdf8; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Stoxtrac AI</h1>
        <p>Advanced Market & Political Sentiment Analysis</p>
        
        <div class="setup-box">
            <label for="apiKey" style="display:block; text-align:left; margin-bottom:5px;">OpenAI API Key (For your eyes only):</label>
            <input type="password" id="apiKey" placeholder="sk-proj-...">
        </div>

        <input type="text" id="ticker" placeholder="Enter Stock Ticker (e.g., TSLA, AAPL)" style="font-size: 1.1em; text-transform: uppercase;">
        <button onclick="analyzeStock()">Analyze Stock</button>
        
        <div id="loading" class="loader">Stoxtrac AI is analyzing data... please wait.</div>
        <div id="results"></div>
    </div>

    <script>
        async function analyzeStock() {
            const apiKey = document.getElementById('apiKey').value;
            const ticker = document.getElementById('ticker').value.toUpperCase();
            const resultsDiv = document.getElementById('results');
            const loadingDiv = document.getElementById('loading');

            if (!apiKey || !ticker) {
                alert("Please enter both your API Key and a Stock Ticker.");
                return;
            }

            // Hide previous results, show loading
            resultsDiv.style.display = 'none';
            loadingDiv.style.display = 'block';

            // The System Prompt: Giving your AI its personality and rules
            const systemPrompt = `You are the elite Stoxtrac AI Financial Analyst. 
            Analyze the stock ticker provided by the user.
            Provide your analysis in clear sections:
            1. Political & News Trend: What is the current macro/political sentiment affecting this sector?
            2. Technical Outlook: Short-term vs Long-term view.
            3. Action Plan: Provide a realistic "Buy Price" and "Profit Take (Sell) Price".
            Keep it professional, concise, and formatted easily for reading.`;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + apiKey
                    },
                    body: JSON.stringify({
                        model: 'gpt-4o-mini', // Using the fast, cheap model
                        messages: [
                            { role: 'system', content: systemPrompt },
                            { role: 'user', content: 'Analyze this stock: ' + ticker }
                        ],
                        temperature: 0.7
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = "Error: " + data.error.message;
                } else {
                    resultsDiv.innerHTML = data.choices[0].message.content;
                }

            } catch (error) {
                resultsDiv.innerHTML = "Connection Error. Please check your internet or API key.";
            }

            // Hide loading, show results
            loadingDiv.style.display = 'none';
            resultsDiv.style.display = 'block';
        }
    </script>
</body>
</html>
